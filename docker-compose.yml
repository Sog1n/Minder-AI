services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minder_ai_backend
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DEBUG: "true"
      LLM_MODE: ${LLM_MODE:-demo}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EXTRACTION_MODEL: ${OPENAI_EXTRACTION_MODEL:-gpt-4o}
      OPENAI_JUDGE_MODEL: ${OPENAI_JUDGE_MODEL:-gpt-4o-mini}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: secret
      MYSQL_DATABASE: minder_ai
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_KNOWLEDGE: tribal_knowledge
      QDRANT_COLLECTION_SOP: sop_documents
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - qdrant
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: minder_ai_mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: minder_ai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: minder_ai_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  qdrant_data:
